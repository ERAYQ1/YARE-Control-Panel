version: '3.8'

services:
  yare-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yare-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - DB_PATH=/opt/yare/yare.db
      - JWT_SECRET=yare_secret_key_change_in_production_32bytes
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    volumes:
      - yare_data:/opt/yare
      - yare_config:/etc/yare
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostroot:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  yare_data:
    driver: local
  yare_config:
    driver: local
