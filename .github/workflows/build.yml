name: YARE Panel CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Monorepo Dependencies
        run: |
          npm run setup

      - name: Build Frontend & Copy Assets
        run: |
          npm run build:frontend
          node scripts/copy-dist.js

      - name: Run Backend & Frontend Tests
        run: |
          cd apps/backend
          go mod tidy
          go test ./...
          cd ../frontend
          npm test --if-present || true

      - name: Build Go Backend Binary
        run: |
          cd apps/backend
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o ../../yare-panel main.go

  release:
    name: GitHub Release Publish
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Frontend SPA
        run: |
          npm run setup
          npm run build:frontend
          node scripts/copy-dist.js

      - name: Build Cross-Platform Standalone Binaries
        run: |
          mkdir -p release-dist
          cd apps/backend
          go mod tidy

          # Linux amd64 & arm64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../release-dist/yare-panel-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../release-dist/yare-panel-linux-arm64 main.go

          # Windows amd64 (.exe)
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../release-dist/yare-panel-windows-amd64.exe main.go

          # macOS amd64 & arm64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../release-dist/yare-panel-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../release-dist/yare-panel-darwin-arm64 main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
